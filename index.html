<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Experiencia VR parking - Coches 3D</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <!-- Imagen de fondo -->
        <img id="panorama" src="parking.png">
      </a-assets>

      <!-- Fondo panorámico con brillo ajustado -->
      <a-cylinder src="#panorama" 
                  radius="10" 
                  height="10" 
                  open-ended="true" 
                  material="side: back; shader: flat" 
                  rotation="0 90 0">
      </a-cylinder>

      <!-- Suelo circular gris -->
      <a-circle position="0 -4.99 0" 
                rotation="-90 0 0" 
                radius="5" 
                color="#808080">
      </a-circle>

      <!-- 3 COCHES GEOMÉTRICOS CON ANIMACIÓN DE ROTACIÓN -->
      
      <!-- Coche 1 (Izquierda) -->
      <a-entity position="-2.5 0.5 -5" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-box width="1.5" height="0.4" depth="3" color="#000000"></a-box> <!-- Chasis -->
        <a-box position="0 0.4 0.2" width="1.2" height="0.5" depth="1.5" color="#222222"></a-box> <!-- Cabina -->
        <a-cylinder position="0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder> <!-- Ruedas -->
        <a-cylinder position="-0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="-0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
      </a-entity>

      <!-- Coche 2 (Centro) -->
      <a-entity position="0 0.5 -6" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-box width="1.5" height="0.4" depth="3" color="#000000"></a-box>
        <a-box position="0 0.4 0.2" width="1.2" height="0.5" depth="1.5" color="#222222"></a-box>
        <a-cylinder position="0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="-0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="-0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
      </a-entity>

      <!-- Coche 3 (Derecha) -->
      <a-entity position="2.5 0.5 -5" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-box width="1.5" height="0.4" depth="3" color="#000000"></a-box>
        <a-box position="0 0.4 0.2" width="1.2" height="0.5" depth="1.5" color="#222222"></a-box>
        <a-cylinder position="0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="-0.8 -0.2 1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
        <a-cylinder position="-0.8 -0.2 -1" rotation="90 0 90" radius="0.3" height="0.2" color="#111"></a-cylinder>
      </a-entity>

      <!-- Iluminación -->
      <a-entity light="type: ambient; intensity: 0.8; color: #ffffff"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; position: 1 3 2"></a-entity>

      <!-- Cámara y controles -->
      <a-entity position="0 0 0">
        <a-camera wasd-controls-enabled="true" look-controls="true">
            <a-cursor color="red"></a-cursor>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
